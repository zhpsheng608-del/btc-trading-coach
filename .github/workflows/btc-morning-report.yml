name: BTC 每日晨报 (09:00 CST)

on:
  schedule:
    # 每天 09:00 CST = 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report type'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning

env:
  CODEX_BIN: codex
  MODEL: o3-mini

jobs:
  morning-report:
    name: Generate & Send Morning Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Verify Codex installation
        run: codex --version

      - name: Run BTC analysis (morning report)
        run: |
          bash scripts/run-btc-analysis.sh morning
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: btc-morning-report
          path: reports/*.md
          retention-days: 7
